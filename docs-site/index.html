<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UtilityKit — 63 Bash tools, one dashboard</title>
    <meta name="description" content="A modular Bash toolkit: 63 standalone tools for Linux, macOS, and Termux, unified under a single interactive dashboard and CLI router. MIT licensed." />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta property="og:title" content="UtilityKit — 63 Bash tools, one dashboard" />
    <meta property="og:description" content="A modular Bash toolkit for Linux, macOS, and Termux. Run any of 63 tools standalone or navigate all from a single arrow-key dashboard." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <script>
      // Prevent flash of wrong theme
      (function() {
        try {
          var stored = localStorage.getItem('uk-theme');
          var isDark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
